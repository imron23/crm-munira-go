services:
  # ─── Backend API Service ─────────────────────────────────────────────────────
  backend:
    type: app
    name: crm-munira-api
    source:
      type: git
      url: https://github.com/imron23/crm-munira-go
      branch: main
    build:
      type: dockerfile
      path: backend/Dockerfile
      context: ./backend
    env:
      PORT: 8080
      POSTGRES_URI: postgresql://munira:munira_password@crm-munira-db:5432/munira_crm
      ADMIN_USERNAME: Imron23
      ADMIN_PASSWORD: Imunira234..
    routes:
      - port: 8080
        path: /
    deploy:
      replicas: 1
      resources:
        memory: 512Mi
        cpu: 0.5

  # ─── PostgreSQL Database ──────────────────────────────────────────────────────
  postgres:
    type: database
    name: crm-munira-db
    engine: postgres
    version: "15"
    user: munira
    password: munira_password
    database: munira_crm