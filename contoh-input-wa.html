<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Input WhatsApp</title>
    <!-- CSS intlTelInput -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/css/intlTelInput.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            padding: 50px;
            background-color: #f3f4f6;
        }

        .sf-wrap {
            background: #fff;
            border-radius: 20px;
            padding: 40px 36px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 16px 60px rgba(26, 54, 93, .1);
        }

        .sf-group {
            margin-bottom: 18px;
        }

        .sf-group label {
            display: block;
            font-weight: 700;
            font-size: .88rem;
            color: #1a365d;
            margin-bottom: 8px;
        }

        .sf-group label .req {
            color: #e53e3e;
        }

        /* Styling the input to match the image */
        .sf-inp {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #cbd5e0;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: .95rem;
            color: #2c3e50;
            background: #f8fafc;
            transition: .25s;
            box-sizing: border-box;
            outline: none;
        }

        .sf-inp:focus {
            border-color: #C5A059;
            box-shadow: 0 0 0 3px rgba(197, 160, 89, .18);
            background: #fff;
        }

        /* Overrides for intlTelInput so it looks seamless with .sf-inp */
        .iti {
            width: 100%;
            display: block;
        }

        .iti__flag-container {
            border-radius: 10px 0 0 10px;
        }

        .iti--separate-dial-code .iti__selected-flag {
            background-color: #f8fafc;
            border-radius: 10px 0 0 10px;
            border-right: 1.5px solid #cbd5e0;
        }

        /* Adjust input padding so text doesn't hide behind the flag */
        .iti--separate-dial-code .sf-inp {
            padding-left: 90px !important;
            /* adjust based on flag width */
        }
    </style>
</head>

<body>

    <div class="sf-wrap">
        <form id="demoForm">
            <!-- Model Input WhatsApp -->
            <div class="sf-group">
                <label for="sfHp">No. WhatsApp <span class="req">*</span></label>
                <!-- Input field -->
                <input type="tel" id="sfHp" class="sf-inp" placeholder="812xxxx" autocomplete="tel">
                <div id="result" style="margin-top: 10px; font-size: 0.85rem; color: #16a34a; display: none;"></div>
            </div>

            <button type="submit"
                style="padding: 12px 24px; background: #C5A059; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;">
                Test Submit
            </button>
        </form>
    </div>

    <!-- JS intlTelInput -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/js/intlTelInput.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const input = document.querySelector("#sfHp");

            // Inisialisasi plugin intlTelInput
            const iti = window.intlTelInput(input, {
                initialCountry: "id", // default Indonesia
                separateDialCode: true, // memisahkan kode dial dan menampilkan garis vertikal
                utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/js/utils.js", // untuk formatting & validasi
                preferredCountries: ["id", "my", "sg", "sa"] // negara prioritas di atas
            });

            // Demo submit untuk melihat hasil full number (kode negara + nomor)
            document.getElementById('demoForm').addEventListener('submit', function (e) {
                e.preventDefault();

                // Mengambil nomor lengkap dengan kode negara
                const fullNumber = iti.getNumber();

                if (iti.isValidNumber()) {
                    const resultDiv = document.getElementById('result');
                    resultDiv.innerHTML = `Nomor Valid!<br>Format Lengkap: <strong>${fullNumber}</strong>`;
                    resultDiv.style.color = '#16a34a'; // green
                    resultDiv.style.display = 'block';
                } else {
                    const resultDiv = document.getElementById('result');
                    resultDiv.innerHTML = `Nomor tidak valid!`;
                    resultDiv.style.color = '#e53e3e'; // red
                    resultDiv.style.display = 'block';
                }
            });
        });
    </script>
</body>

</html>
